<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobCopilot — Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar__brand">JobCopilot</div>
    <ul class="navbar__nav">
      <li><a href="index.html" class="navbar__link navbar__link--active" aria-current="page">Dashboard</a></li>
      <li><a href="jobs.html" class="navbar__link">Jobs</a></li>
      <li><a href="today.html" class="navbar__link">Fresh</a></li>
      <li><a href="india-feed.html" class="navbar__link">India</a></li>
      <li><a href="regional.html" class="navbar__link">Regional</a></li>
      <li><a href="career-radar.html" class="navbar__link">Radar</a></li>
      <li><a href="internships.html" class="navbar__link">Internships</a></li>
      <li><a href="analytics.html" class="navbar__link">Analytics</a></li>
      <li><a href="saved.html" class="navbar__link">Saved</a></li>
      <li><a href="watchlist.html" class="navbar__link">Watchlist</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <header class="page-header">
      <h1 class="page-header__title">Dashboard</h1>
      <p class="page-header__subtitle">Your job search at a glance</p>
    </header>

    <!-- Personal Dashboard Sections (hidden by default, shown when data loads) -->
    <div id="personal-dashboard" style="display: none;">
      <!-- Pinned Company Jobs Section -->
      <section id="pinned-company-jobs-section" class="mb-lg" aria-label="Pinned company jobs" style="display: none;">
        <h2 class="page-header__title" style="font-size: var(--font-size-xl); margin-bottom: var(--space-md);">⭐ Pinned Company Jobs</h2>
        <div id="pinned-company-jobs-container" class="grid grid--3col"></div>
      </section>

      <!-- Pinned Collection Jobs Section -->
      <section id="pinned-collection-jobs-section" class="mb-lg" aria-label="Pinned collection jobs" style="display: none;">
        <h2 class="page-header__title" style="font-size: var(--font-size-xl); margin-bottom: var(--space-md);">📂 Pinned Collection Jobs</h2>
        <div id="pinned-collection-jobs-container" class="grid grid--3col"></div>
      </section>

      <!-- New Research Opportunities Section -->
      <section id="new-research-section" class="mb-lg" aria-label="New research opportunities" style="display: none;">
        <h2 class="page-header__title" style="font-size: var(--font-size-xl); margin-bottom: var(--space-md);">🔬 New Research Opportunities</h2>
        <div id="new-research-container" class="grid grid--3col"></div>
      </section>
    </div>

    <!-- Metric Cards Section -->
    <section aria-label="Summary metrics">
      <div id="metrics-container" class="grid grid--metrics">
        <!-- Skeleton loaders shown while loading -->
        <div class="skeleton skeleton--metric"></div>
        <div class="skeleton skeleton--metric"></div>
        <div class="skeleton skeleton--metric"></div>
        <div class="skeleton skeleton--metric"></div>
        <div class="skeleton skeleton--metric"></div>
      </div>
    </section>

    <!-- Recent Jobs Table -->
    <section class="mt-xl" aria-label="Recent jobs">
      <h2 class="page-header__title" style="font-size: var(--font-size-xl); margin-bottom: var(--space-md);">Recent Jobs</h2>
      <div id="recent-jobs-container">
        <!-- Skeleton loaders for table -->
        <div class="skeleton skeleton--row"></div>
        <div class="skeleton skeleton--row"></div>
        <div class="skeleton skeleton--row"></div>
        <div class="skeleton skeleton--row"></div>
        <div class="skeleton skeleton--row"></div>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
