name: Daily Job Scraper

on:
  schedule:
    - cron: '30 2 * * *'  # 08:00 AM IST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Verify Dependencies
        run: |
          python -c "import pyarrow; print(f'pyarrow {pyarrow.__version__} OK')"
          python -c "import pandas; print(f'pandas {pandas.__version__} OK')"
          python -c "import requests; print('requests OK')"

      - name: Test MongoDB Connection
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DATABASE_NAME: jobcopilot
        run: |
          cd backend
          python -c "from pymongo import MongoClient; import os; c = MongoClient(os.environ['MONGODB_URI'], serverSelectionTimeoutMS=10000); c.admin.command('ping'); print('MongoDB connection OK')"

      - name: Run Scraper
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DATABASE_NAME: jobcopilot
          SEARCH_TERMS: "Biomedical Engineer,Medical Device Engineer,Research Associate,Research Engineer,Clinical Research,Healthcare AI,Embedded Systems Engineer,IoT Engineer,Python Developer,Fresher Engineer,Graduate Engineer Trainee,Project Associate,JRF,Biosensor,Diagnostics"
          LOCATIONS: "India,Bangalore,Chennai,Coimbatore,Hyderabad,Pune,Mumbai,Gurgaon,Remote,Delhi,Noida"
          JOB_SOURCES: "linkedin,indeed,naukri,google"
        run: |
          cd backend
          python daily_scraper.py
