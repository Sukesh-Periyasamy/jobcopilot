name: LinkedIn Jobs Scraper

on:
  schedule:
    - cron: '0 3 * * *'  # 08:30 AM IST
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-linkedin:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Chrome for LinkedIn Scraper
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Run LinkedIn Scraper
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DATABASE_NAME: jobcopilot
        run: |
          cd backend
          python -c "
from app.scraper.linkedin_scraper import scrape_linkedin_jobs
from app.database.repository import JobsRepository

result = scrape_linkedin_jobs()
print(f'LinkedIn scrape: {len(result.jobs)} jobs, {len(result.errors)} errors')

if result.jobs:
    repo = JobsRepository()
    insert_result = repo.bulk_insert(result.jobs)
    print(f'Inserted: {insert_result.inserted_count} new, {insert_result.duplicates_skipped} duplicates')
else:
    print('No jobs collected from LinkedIn')

if result.errors:
    for err in result.errors[:5]:
        print(f'Error: {err}')
"
